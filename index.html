<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Задачи — Assistant</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #6e6e73;
    --border: #e3e3e6;
    --accent: #0a84ff;
    --danger: #ff453a;
    --col-bg: #ececef;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --text: #f2f2f7;
      --muted: #9a9a9e;
      --border: #3a3a3c;
      --col-bg: #242426;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 12px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .view { display: none; }
  .view.active { display: block; }

  .meeting-group {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .meeting-header {
    padding: 12px 16px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .meeting-header .date {
    font-weight: 400;
    color: var(--muted);
    font-size: 13px;
  }
  .task-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row .time {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }
  .task-row .text { flex: 1; }
  .status-done .text { text-decoration: line-through; color: var(--muted); }
  .del-btn {
    border: none;
    background: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
  }
  .del-btn:hover { color: var(--danger); }
  .auto-btn {
    border: none;
    background: none;
    font-size: 15px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    opacity: 0.5;
  }
  .auto-btn.active { opacity: 1; }
  .run-badge {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .run-badge a { color: var(--accent); }

  .empty, .loading, .error {
    color: var(--muted);
    padding: 24px 4px;
    text-align: center;
  }
  .error { color: var(--danger); }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 700px) {
    .board { grid-template-columns: 1fr; }
  }
  .column {
    background: var(--col-bg);
    border-radius: 12px;
    padding: 10px;
    min-height: 120px;
  }
  .column-title {
    font-weight: 600;
    font-size: 14px;
    padding: 4px 6px 10px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    font-size: 14px;
    cursor: grab;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .card.dragging { opacity: 0.4; }
  .card .card-text { flex: 1; }
  .card .meeting-tag {
    display: block;
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
  }
  .column.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
</style>
</head>
<body>
  <h1>Задачи</h1>
  <div class="tabs">
    <button class="tab-btn active" data-view="list">Список</button>
    <button class="tab-btn" data-view="board">Канбан</button>
  </div>

  <div id="view-list" class="view active">
    <div id="content" class="loading">Загрузка…</div>
  </div>

  <div id="view-board" class="view">
    <div id="board" class="board"></div>
  </div>

<script>
const API_BASE = "https://hub.xn--80aamvb5b.team/webhook";
const STATUS_LABELS = { open: "Открыта", in_progress: "В работе", done: "Готово" };
const STATUS_ORDER = ["open", "in_progress", "done"];

function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get("t") || "";
}
const TOKEN = getToken();

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleString("ru-RU", {
    timeZone: "Europe/Moscow",
    day: "2-digit", month: "2-digit", year: "numeric",
    hour: "2-digit", minute: "2-digit"
  });
}

function formatTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleString("ru-RU", {
    timeZone: "Europe/Moscow",
    hour: "2-digit", minute: "2-digit"
  });
}

let tasksCache = [];

async function loadTasks() {
  const content = document.getElementById("content");
  if (!TOKEN) {
    content.className = "error";
    content.textContent = "Нет токена доступа в ссылке (?t=...).";
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/assistant-tasks?t=${encodeURIComponent(TOKEN)}`);
    if (!res.ok) {
      content.className = "error";
      content.textContent = res.status === 403
        ? "Неверный токен доступа."
        : `Ошибка загрузки (${res.status}).`;
      return;
    }
    tasksCache = await res.json();
    renderList(tasksCache);
    renderBoard(tasksCache);
  } catch (e) {
    content.className = "error";
    content.textContent = "Не удалось связаться с сервером.";
  }
}

async function deleteTask(id) {
  if (!confirm("Удалить задачу без возможности восстановить?")) return;
  await fetch(`${API_BASE}/assistant-tasks-delete?t=${encodeURIComponent(TOKEN)}&id=${id}`);
  tasksCache = tasksCache.filter((t) => t.id !== id);
  renderList(tasksCache);
  renderBoard(tasksCache);
}

async function toggleAutoRun(id) {
  const task = tasksCache.find((t) => t.id === id);
  if (!task) return;

  if (task.auto_run) {
    if (!confirm('Снять пометку "выполнить автоматически"?')) return;
    await fetch(`${API_BASE}/assistant-tasks-mark?t=${encodeURIComponent(TOKEN)}&id=${id}&auto_run=false&context=`);
    task.auto_run = false;
    task.run_status = null;
    task.run_result = null;
  } else {
    const context = prompt(
      "Опишите весь контекст для выполнения (какой проект, что именно сделать) — облачный агент увидит только этот текст:",
      task.context || ""
    );
    if (context === null || context.trim() === "") return;
    await fetch(`${API_BASE}/assistant-tasks-mark?t=${encodeURIComponent(TOKEN)}&id=${id}&auto_run=true&context=${encodeURIComponent(context)}`);
    task.auto_run = true;
    task.context = context;
    task.run_status = "queued";
    task.run_result = null;
  }
  renderList(tasksCache);
  renderBoard(tasksCache);
}

function runBadge(t) {
  if (!t.auto_run && !t.run_status) return null;
  const badge = document.createElement("span");
  badge.className = "run-badge";
  const labels = { queued: "В очереди на авто-выполнение", in_progress: "Выполняется", pr_opened: "Готово: открыт PR", failed: "Ошибка", needs_clarification: "Нужны уточнения" };
  const label = labels[t.run_status] || t.run_status || "В очереди";
  if (t.run_result && /^https?:\/\//.test(t.run_result.trim())) {
    badge.textContent = label + ": ";
    const a = document.createElement("a");
    a.href = t.run_result.trim();
    a.target = "_blank";
    a.textContent = t.run_result.trim();
    badge.appendChild(a);
  } else {
    badge.textContent = label + (t.run_result ? ": " + t.run_result : "");
  }
  return badge;
}

async function setStatus(id, status) {
  const task = tasksCache.find((t) => t.id === id);
  if (task) task.status = status;
  renderList(tasksCache);
  renderBoard(tasksCache);
  await fetch(`${API_BASE}/assistant-tasks-status?t=${encodeURIComponent(TOKEN)}&id=${id}&status=${status}`);
}

function renderList(tasks) {
  const content = document.getElementById("content");
  if (!tasks.length) {
    content.className = "empty";
    content.textContent = "Задач пока нет.";
    return;
  }

  const groups = new Map();
  const noMeetingKey = "__none__";
  for (const t of tasks) {
    const key = t.meeting_name || noMeetingKey;
    if (!groups.has(key)) groups.set(key, { name: t.meeting_name, date: t.meeting_date, tasks: [] });
    groups.get(key).tasks.push(t);
  }

  content.className = "";
  content.innerHTML = "";
  for (const group of groups.values()) {
    const card = document.createElement("div");
    card.className = "meeting-group";

    const header = document.createElement("div");
    header.className = "meeting-header";
    const title = document.createElement("span");
    title.textContent = group.name || "Без совещания";
    header.appendChild(title);
    if (group.date) {
      const date = document.createElement("span");
      date.className = "date";
      date.textContent = formatDate(group.date);
      header.appendChild(date);
    }
    card.appendChild(header);

    for (const t of group.tasks) {
      const row = document.createElement("div");
      row.className = "task-row" + (t.status === "done" ? " status-done" : "");
      const time = document.createElement("span");
      time.className = "time";
      time.textContent = formatTime(t.created_at);
      const textWrap = document.createElement("span");
      textWrap.className = "text";
      textWrap.textContent = t.text;
      const badge = runBadge(t);
      if (badge) textWrap.appendChild(badge);
      const auto = document.createElement("button");
      auto.className = "auto-btn" + (t.auto_run ? " active" : "");
      auto.textContent = "🤖";
      auto.title = t.auto_run ? "Помечено для авто-выполнения — нажмите, чтобы снять" : "Поставить на авто-выполнение (облачный агент)";
      auto.addEventListener("click", () => toggleAutoRun(t.id));
      const del = document.createElement("button");
      del.className = "del-btn";
      del.textContent = "✕";
      del.title = "Удалить";
      del.addEventListener("click", () => deleteTask(t.id));
      row.appendChild(time);
      row.appendChild(textWrap);
      row.appendChild(auto);
      row.appendChild(del);
      card.appendChild(row);
    }
    content.appendChild(card);
  }
}

function renderBoard(tasks) {
  const board = document.getElementById("board");
  board.innerHTML = "";
  for (const status of STATUS_ORDER) {
    const column = document.createElement("div");
    column.className = "column";
    column.dataset.status = status;

    const title = document.createElement("div");
    title.className = "column-title";
    title.textContent = STATUS_LABELS[status];
    column.appendChild(title);

    for (const t of tasks.filter((x) => x.status === status)) {
      const card = document.createElement("div");
      card.className = "card";
      card.draggable = true;
      card.dataset.id = t.id;

      const textWrap = document.createElement("div");
      textWrap.className = "card-text";
      textWrap.textContent = t.text;
      if (t.meeting_name) {
        const tag = document.createElement("span");
        tag.className = "meeting-tag";
        tag.textContent = t.meeting_name;
        textWrap.appendChild(tag);
      }
      const badge = runBadge(t);
      if (badge) textWrap.appendChild(badge);

      const auto = document.createElement("button");
      auto.className = "auto-btn" + (t.auto_run ? " active" : "");
      auto.textContent = "🤖";
      auto.title = t.auto_run ? "Помечено для авто-выполнения — нажмите, чтобы снять" : "Поставить на авто-выполнение (облачный агент)";
      auto.addEventListener("click", () => toggleAutoRun(t.id));

      const del = document.createElement("button");
      del.className = "del-btn";
      del.textContent = "✕";
      del.title = "Удалить";
      del.addEventListener("click", () => deleteTask(t.id));

      card.appendChild(textWrap);
      card.appendChild(auto);
      card.appendChild(del);

      card.addEventListener("dragstart", () => {
        card.classList.add("dragging");
        card.dataset.dragging = "1";
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
      });

      column.appendChild(card);
    }

    column.addEventListener("dragover", (e) => {
      e.preventDefault();
      column.classList.add("drag-over");
    });
    column.addEventListener("dragleave", () => {
      column.classList.remove("drag-over");
    });
    column.addEventListener("drop", (e) => {
      e.preventDefault();
      column.classList.remove("drag-over");
      const dragging = board.querySelector(".card.dragging");
      if (!dragging) return;
      const id = Number(dragging.dataset.id);
      setStatus(id, status);
    });

    board.appendChild(column);
  }
}

document.querySelectorAll(".tab-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
    document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(`view-${btn.dataset.view}`).classList.add("active");
  });
});

loadTasks();
</script>
</body>
</html>
