<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Задачи — Assistant</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #6e6e73;
    --border: #e3e3e6;
    --accent: #0a84ff;
    --danger: #ff453a;
    --col-bg: #ececef;
    --auto-bg: #f2ecff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --text: #f2f2f7;
      --muted: #9a9a9e;
      --border: #3a3a3c;
      --col-bg: #242426;
      --auto-bg: #2c2440;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 12px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .view { display: none; }
  .view.active { display: block; }

  .meeting-group {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .meeting-header {
    padding: 12px 16px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .meeting-header .date {
    font-weight: 400;
    color: var(--muted);
    font-size: 13px;
  }
  .task-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row.auto-marked {
    background: var(--auto-bg);
    border-left: 3px solid #8a4fff;
    margin-left: -3px;
  }
  .task-row .time {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }
  .task-row .text { flex: 1; }
  .status-done .text { text-decoration: line-through; color: var(--muted); }
  .del-btn {
    border: none;
    background: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
  }
  .del-btn:hover { color: var(--danger); }
  .run-badge {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .run-badge a { color: var(--accent); }
  .task-row .text, .card .card-text { cursor: pointer; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin: 0 0 14px; }
  .modal label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 12px 0 4px;
  }
  .modal textarea, .modal select {
    width: 100%;
    font: inherit;
    color: inherit;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .modal textarea { resize: vertical; min-height: 44px; }
  .modal .meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 12px;
    line-height: 1.6;
  }
  .modal .meta a { color: var(--accent); }
  .modal .auto-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 14px;
  }
  .modal .actions {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-top: 18px;
  }
  .modal button {
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .modal .save-btn { background: var(--accent); color: #fff; }
  .modal .close-btn { background: var(--col-bg); color: var(--text); }
  .modal .delete-btn { background: none; color: var(--danger); }

  .empty, .loading, .error {
    color: var(--muted);
    padding: 24px 4px;
    text-align: center;
  }
  .error { color: var(--danger); }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 700px) {
    .board { grid-template-columns: 1fr; }
  }
  .column {
    background: var(--col-bg);
    border-radius: 12px;
    padding: 10px;
    min-height: 120px;
  }
  .column-title {
    font-weight: 600;
    font-size: 14px;
    padding: 4px 6px 10px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    font-size: 14px;
    cursor: grab;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .card.dragging { opacity: 0.4; }
  .card.auto-marked {
    background: var(--auto-bg);
    border-color: #8a4fff;
  }
  .card .card-text { flex: 1; }
  .card .meeting-tag {
    display: block;
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
  }
  .column.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }

  .add-task-btn {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>Задачи</h1>
  <div class="tabs">
    <button class="tab-btn active" data-view="list">Список</button>
    <button class="tab-btn" data-view="board">Канбан</button>
  </div>

  <div id="view-list" class="view active">
    <div id="content" class="loading">Загрузка…</div>
  </div>

  <div id="view-board" class="view">
    <div id="board" class="board"></div>
  </div>

  <button id="add-task-btn" class="add-task-btn">+ Добавить задачу</button>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Задача</h2>
      <label for="modal-text">Название работы</label>
      <textarea id="modal-text"></textarea>

      <label for="modal-status">Статус</label>
      <select id="modal-status">
        <option value="open">Открыта</option>
        <option value="in_progress">В работе</option>
        <option value="done">Готово</option>
      </select>

      <label for="modal-context">Контекст для автовыполнения (облачный агент)</label>
      <textarea id="modal-context" placeholder="Например: Проект СБ3_Шахматка. Сделать шрифт в аналитике крупнее."></textarea>

      <label for="modal-tasktype">Тип задачи для облачного агента</label>
      <select id="modal-tasktype">
        <option value="code">Правка кода (агент откроет Pull Request)</option>
        <option value="report">Отчёт / анализ данных (агент посчитает и пришлёт в Telegram)</option>
      </select>

      <div class="auto-row">
        <input type="checkbox" id="modal-autorun">
        <label for="modal-autorun" style="margin:0;">Выполнить автоматически ночью</label>
      </div>

      <div id="modal-meta" class="meta"></div>

      <div class="actions">
        <button class="delete-btn" id="modal-delete">Удалить</button>
        <div style="display:flex; gap:8px;">
          <button class="close-btn" id="modal-close">Отмена</button>
          <button class="save-btn" id="modal-save">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

<script>
const API_BASE = "https://hub.xn--80aamvb5b.team/webhook";
const STATUS_LABELS = { open: "Открыта", in_progress: "В работе", done: "Готово" };
const STATUS_ORDER = ["open", "in_progress", "done"];

function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get("t") || "";
}
const TOKEN = getToken();

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleString("ru-RU", {
    timeZone: "Europe/Moscow",
    day: "2-digit", month: "2-digit", year: "numeric",
    hour: "2-digit", minute: "2-digit"
  });
}

function formatTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleString("ru-RU", {
    timeZone: "Europe/Moscow",
    hour: "2-digit", minute: "2-digit"
  });
}

let tasksCache = [];

async function loadTasks() {
  const content = document.getElementById("content");
  if (!TOKEN) {
    content.className = "error";
    content.textContent = "Нет токена доступа в ссылке (?t=...).";
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/assistant-tasks?t=${encodeURIComponent(TOKEN)}`);
    if (!res.ok) {
      content.className = "error";
      content.textContent = res.status === 403
        ? "Неверный токен доступа."
        : `Ошибка загрузки (${res.status}).`;
      return;
    }
    tasksCache = await res.json();
    renderList(tasksCache);
    renderBoard(tasksCache);
  } catch (e) {
    content.className = "error";
    content.textContent = "Не удалось связаться с сервером.";
  }
}

async function deleteTask(id) {
  if (!confirm("Удалить задачу без возможности восстановить?")) return;
  await fetch(`${API_BASE}/assistant-tasks-delete?t=${encodeURIComponent(TOKEN)}&id=${id}`);
  tasksCache = tasksCache.filter((t) => t.id !== id);
  renderList(tasksCache);
  renderBoard(tasksCache);
}

let modalTaskId = null;
let modalIsNew = false;

function openTaskModal(id) {
  const task = tasksCache.find((t) => t.id === id);
  if (!task) return;
  modalTaskId = id;
  modalIsNew = false;

  document.getElementById("modal-title").textContent = "Задача";
  document.getElementById("modal-delete").style.display = "";
  document.getElementById("modal-text").value = task.text || "";
  document.getElementById("modal-status").value = task.status || "open";
  document.getElementById("modal-context").value = task.context || "";
  document.getElementById("modal-tasktype").value = task.task_type || "code";
  document.getElementById("modal-autorun").checked = !!task.auto_run;

  const meta = document.getElementById("modal-meta");
  meta.innerHTML = "";
  const lines = [];
  lines.push(`Создана: ${formatDate(task.created_at)}`);
  if (task.meeting_name) lines.push(`Совещание: ${task.meeting_name} (${formatDate(task.meeting_date)})`);
  if (task.done_at) lines.push(`Выполнена: ${formatDate(task.done_at)}`);
  for (const line of lines) {
    const div = document.createElement("div");
    div.textContent = line;
    meta.appendChild(div);
  }
  if (task.run_status) {
    const div = document.createElement("div");
    const labels = { queued: "В очереди на авто-выполнение", in_progress: "Выполняется", pr_opened: "Готово: открыт PR", failed: "Ошибка автозапуска", needs_clarification: "Нужны уточнения" };
    const label = labels[task.run_status] || task.run_status;
    if (task.run_result && /^https?:\/\//.test(task.run_result.trim())) {
      div.append(label + ": ");
      const a = document.createElement("a");
      a.href = task.run_result.trim();
      a.target = "_blank";
      a.textContent = task.run_result.trim();
      div.appendChild(a);
    } else {
      div.textContent = label + (task.run_result ? ": " + task.run_result : "");
    }
    meta.appendChild(div);
  }

  document.getElementById("modal-overlay").classList.add("open");
}

function openNewTaskModal() {
  modalTaskId = null;
  modalIsNew = true;

  document.getElementById("modal-title").textContent = "Новая задача";
  document.getElementById("modal-delete").style.display = "none";
  document.getElementById("modal-text").value = "";
  document.getElementById("modal-status").value = "open";
  document.getElementById("modal-context").value = "";
  document.getElementById("modal-tasktype").value = "code";
  document.getElementById("modal-autorun").checked = false;
  document.getElementById("modal-meta").innerHTML = "";

  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  modalTaskId = null;
}

async function saveModal() {
  const newText = document.getElementById("modal-text").value.trim();
  const newStatus = document.getElementById("modal-status").value;
  const newContext = document.getElementById("modal-context").value;
  const newTaskType = document.getElementById("modal-tasktype").value;
  const newAutoRun = document.getElementById("modal-autorun").checked;

  if (modalIsNew) {
    if (!newText) return closeModal();
    closeModal();
    const res = await fetch(`${API_BASE}/assistant-tasks-create?t=${encodeURIComponent(TOKEN)}&text=${encodeURIComponent(newText)}`);
    const [created] = await res.json();
    if (!created) return;
    tasksCache.unshift(created);
    if (newStatus !== "open") {
      await fetch(`${API_BASE}/assistant-tasks-status?t=${encodeURIComponent(TOKEN)}&id=${created.id}&status=${newStatus}`);
      created.status = newStatus;
    }
    if (newContext.trim() || newAutoRun) {
      await fetch(`${API_BASE}/assistant-tasks-mark?t=${encodeURIComponent(TOKEN)}&id=${created.id}&auto_run=${newAutoRun}&task_type=${newTaskType}&context=${encodeURIComponent(newContext)}`);
      created.context = newContext;
      created.auto_run = newAutoRun;
      created.task_type = newTaskType;
      created.run_status = newAutoRun ? "queued" : null;
    }
    renderList(tasksCache);
    renderBoard(tasksCache);
    return;
  }

  const id = modalTaskId;
  const task = tasksCache.find((t) => t.id === id);
  if (!task) return closeModal();

  const requests = [];
  if (newText && newText !== task.text) {
    requests.push(fetch(`${API_BASE}/assistant-tasks-edit?t=${encodeURIComponent(TOKEN)}&id=${id}&text=${encodeURIComponent(newText)}`));
    task.text = newText;
  }
  if (newStatus !== task.status) {
    requests.push(fetch(`${API_BASE}/assistant-tasks-status?t=${encodeURIComponent(TOKEN)}&id=${id}&status=${newStatus}`));
    task.status = newStatus;
  }
  if (newContext !== (task.context || "") || newAutoRun !== !!task.auto_run || newTaskType !== (task.task_type || "code")) {
    requests.push(fetch(`${API_BASE}/assistant-tasks-mark?t=${encodeURIComponent(TOKEN)}&id=${id}&auto_run=${newAutoRun}&task_type=${newTaskType}&context=${encodeURIComponent(newContext)}`));
    task.context = newContext;
    task.auto_run = newAutoRun;
    task.task_type = newTaskType;
    task.run_status = newAutoRun ? (task.run_status || "queued") : null;
    task.run_result = newAutoRun ? task.run_result : null;
  }

  closeModal();
  renderList(tasksCache);
  renderBoard(tasksCache);
  await Promise.all(requests);
}

document.getElementById("add-task-btn").addEventListener("click", openNewTaskModal);
document.getElementById("modal-save").addEventListener("click", saveModal);
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", (e) => {
  if (e.target.id === "modal-overlay") closeModal();
});
document.getElementById("modal-delete").addEventListener("click", async () => {
  const id = modalTaskId;
  closeModal();
  if (id != null) await deleteTask(id);
});

function runBadge(t) {
  if (!t.auto_run && !t.run_status) return null;
  const badge = document.createElement("span");
  badge.className = "run-badge";
  const labels = { queued: "В очереди на авто-выполнение", in_progress: "Выполняется", pr_opened: "Готово: открыт PR", failed: "Ошибка", needs_clarification: "Нужны уточнения" };
  const label = labels[t.run_status] || t.run_status || "В очереди";
  if (t.run_result && /^https?:\/\//.test(t.run_result.trim())) {
    badge.textContent = label + ": ";
    const a = document.createElement("a");
    a.href = t.run_result.trim();
    a.target = "_blank";
    a.textContent = t.run_result.trim();
    badge.appendChild(a);
  } else {
    badge.textContent = label + (t.run_result ? ": " + t.run_result : "");
  }
  return badge;
}

async function setStatus(id, status) {
  const task = tasksCache.find((t) => t.id === id);
  if (task) task.status = status;
  renderList(tasksCache);
  renderBoard(tasksCache);
  await fetch(`${API_BASE}/assistant-tasks-status?t=${encodeURIComponent(TOKEN)}&id=${id}&status=${status}`);
}

function renderList(tasks) {
  const content = document.getElementById("content");
  if (!tasks.length) {
    content.className = "empty";
    content.textContent = "Задач пока нет.";
    return;
  }

  const groups = new Map();
  const noMeetingKey = "__none__";
  for (const t of tasks) {
    const key = t.meeting_name || noMeetingKey;
    if (!groups.has(key)) groups.set(key, { name: t.meeting_name, date: t.meeting_date, tasks: [] });
    groups.get(key).tasks.push(t);
  }

  content.className = "";
  content.innerHTML = "";
  for (const group of groups.values()) {
    const card = document.createElement("div");
    card.className = "meeting-group";

    const header = document.createElement("div");
    header.className = "meeting-header";
    const title = document.createElement("span");
    title.textContent = group.name || "Без совещания";
    header.appendChild(title);
    if (group.date) {
      const date = document.createElement("span");
      date.className = "date";
      date.textContent = formatDate(group.date);
      header.appendChild(date);
    }
    card.appendChild(header);

    for (const t of group.tasks) {
      const row = document.createElement("div");
      row.className = "task-row" + (t.status === "done" ? " status-done" : "") + (t.auto_run ? " auto-marked" : "");
      const time = document.createElement("span");
      time.className = "time";
      time.textContent = formatTime(t.created_at);
      const textWrap = document.createElement("span");
      textWrap.className = "text";
      textWrap.textContent = t.text;
      textWrap.title = "Открыть задачу";
      textWrap.addEventListener("click", () => openTaskModal(t.id));
      const badge = runBadge(t);
      if (badge) textWrap.appendChild(badge);
      const del = document.createElement("button");
      del.className = "del-btn";
      del.textContent = "✕";
      del.title = "Удалить";
      del.addEventListener("click", (e) => { e.stopPropagation(); deleteTask(t.id); });
      row.appendChild(time);
      row.appendChild(textWrap);
      row.appendChild(del);
      card.appendChild(row);
    }
    content.appendChild(card);
  }
}

function renderBoard(tasks) {
  const board = document.getElementById("board");
  board.innerHTML = "";
  for (const status of STATUS_ORDER) {
    const column = document.createElement("div");
    column.className = "column";
    column.dataset.status = status;

    const title = document.createElement("div");
    title.className = "column-title";
    title.textContent = STATUS_LABELS[status];
    column.appendChild(title);

    for (const t of tasks.filter((x) => x.status === status)) {
      const card = document.createElement("div");
      card.className = "card" + (t.auto_run ? " auto-marked" : "");
      card.draggable = true;
      card.dataset.id = t.id;

      const textWrap = document.createElement("div");
      textWrap.className = "card-text";
      textWrap.textContent = t.text;
      textWrap.title = "Открыть задачу";
      textWrap.addEventListener("click", () => openTaskModal(t.id));
      if (t.meeting_name) {
        const tag = document.createElement("span");
        tag.className = "meeting-tag";
        tag.textContent = t.meeting_name;
        textWrap.appendChild(tag);
      }
      const badge = runBadge(t);
      if (badge) textWrap.appendChild(badge);

      const del = document.createElement("button");
      del.className = "del-btn";
      del.textContent = "✕";
      del.title = "Удалить";
      del.addEventListener("click", (e) => { e.stopPropagation(); deleteTask(t.id); });

      card.appendChild(textWrap);
      card.appendChild(del);

      card.addEventListener("dragstart", () => {
        card.classList.add("dragging");
        card.dataset.dragging = "1";
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
      });

      column.appendChild(card);
    }

    column.addEventListener("dragover", (e) => {
      e.preventDefault();
      column.classList.add("drag-over");
    });
    column.addEventListener("dragleave", () => {
      column.classList.remove("drag-over");
    });
    column.addEventListener("drop", (e) => {
      e.preventDefault();
      column.classList.remove("drag-over");
      const dragging = board.querySelector(".card.dragging");
      if (!dragging) return;
      const id = Number(dragging.dataset.id);
      setStatus(id, status);
    });

    board.appendChild(column);
  }
}

document.querySelectorAll(".tab-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
    document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(`view-${btn.dataset.view}`).classList.add("active");
  });
});

loadTasks();
</script>
</body>
</html>
